<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SRS Tests</title>
<style>body{font-family:monospace;padding:1rem;background:#0f172a;color:#f1f5f9}
.ok{color:#10b981}.fail{color:#ef4444;font-weight:700}</style>
</head><body>
<h1>SRS Unit Tests</h1><div id="out"></div>
<script>document.write('<script src="srs.js?t=' + Date.now() + '"><\/script>');</script>
<script>
const out = document.getElementById('out');
let pass = 0, fail = 0;
function assert(name, cond, detail) {
  const div = document.createElement('div');
  div.className = cond ? 'ok' : 'fail';
  div.textContent = (cond ? '[OK] ' : '[FAIL] ') + name + (cond ? '' : ' -> ' + JSON.stringify(detail));
  out.appendChild(div);
  cond ? pass++ : fail++;
}
const t0 = 1_700_000_000_000;

// --- Task 1: new/learning ---
assert('new -> correct -> learning +10min',
  (() => { const s = SRS.nextState(null, true, t0); return s.stage === 'learning' && s.due_at === t0 + 10*60*1000; })(),
  SRS.nextState(null, true, t0));
assert('new -> wrong -> learning +10min (consumes new)',
  (() => { const s = SRS.nextState(null, false, t0); return s.stage === 'learning' && s.consecutive_correct === 0 && s.due_at === t0 + 10*60*1000; })(),
  SRS.nextState(null, false, t0));
assert('learning -> correct -> review 1 day',
  (() => { const start = { stage: 'learning', consecutive_correct: 0, interval_minutes: 10, total_seen: 1, total_correct: 1 };
    const s = SRS.nextState(start, true, t0); return s.stage === 'review' && s.interval_minutes === 1440; })(),
  null);
assert('learning -> wrong -> stays learning +10min',
  (() => { const start = { stage: 'learning', consecutive_correct: 0, interval_minutes: 10 };
    const s = SRS.nextState(start, false, t0); return s.stage === 'learning' && s.due_at === t0 + 10*60*1000; })(),
  null);

// --- Task 2: review/graduated ---
const rev = (cc, iv) => ({ stage: 'review', consecutive_correct: cc, interval_minutes: iv, total_seen: 5, total_correct: 5 });
assert('review cc=0 iv=1d -> correct -> cc=1 iv=3d',
  (() => { const s = SRS.nextState(rev(0, 1440), true, t0); return s.stage === 'review' && s.interval_minutes === 4320 && s.consecutive_correct === 1; })(), null);
assert('review cc=1 iv=3d -> correct -> cc=2 iv=7d',
  (() => { const s = SRS.nextState(rev(1, 4320), true, t0); return s.stage === 'review' && s.interval_minutes === 10080 && s.consecutive_correct === 2; })(), null);
assert('review cc=2 iv=7d -> correct -> graduated cc=3 iv=30d',
  (() => { const s = SRS.nextState(rev(2, 10080), true, t0); return s.stage === 'graduated' && s.consecutive_correct === 3 && s.interval_minutes === 43200; })(), null);
assert('review -> wrong -> learning +10min cc=0',
  (() => { const s = SRS.nextState(rev(2, 10080), false, t0); return s.stage === 'learning' && s.consecutive_correct === 0 && s.interval_minutes === 10; })(), null);
assert('graduated 30d -> correct -> 90d',
  (() => { const s = SRS.nextState({ stage: 'graduated', consecutive_correct: 3, interval_minutes: 43200, total_seen: 10, total_correct: 10 }, true, t0);
    return s.stage === 'graduated' && s.interval_minutes === 129600; })(), null);
assert('graduated 180d -> correct -> stays 180d (capped)',
  (() => { const s = SRS.nextState({ stage: 'graduated', consecutive_correct: 3, interval_minutes: 259200, total_seen: 20, total_correct: 20 }, true, t0);
    return s.stage === 'graduated' && s.interval_minutes === 259200; })(), null);
assert('graduated -> wrong -> review +1d cc=0',
  (() => { const s = SRS.nextState({ stage: 'graduated', consecutive_correct: 3, interval_minutes: 43200, total_seen: 10, total_correct: 9 }, false, t0);
    return s.stage === 'review' && s.consecutive_correct === 0 && s.interval_minutes === 1440; })(), null);

// --- Task 3: buildDeck ---
const QS = Array.from({ length: 5 }, (_, i) => ({ id: 'q' + (i+1) }));
assert('empty state: 5 new, cap 2 -> deck of 2',
  (() => { const deck = SRS.buildDeck({}, QS, { new_per_day: 2, session_cap: null, order: 'reviews_first' }, t0, 0);
    return deck.length === 2 && deck[0].id === 'q1'; })(), null);
assert('2 due + cap 1 new -> deck [q1,q2,q3]',
  (() => {
    const state = { q1: { stage:'review', due_at:t0-1000, interval_minutes:1440, consecutive_correct:1, total_seen:1, total_correct:1 },
                    q2: { stage:'review', due_at:t0-500,  interval_minutes:1440, consecutive_correct:1, total_seen:1, total_correct:1 } };
    const deck = SRS.buildDeck(state, QS, { new_per_day: 1, session_cap: null, order: 'reviews_first' }, t0, 0);
    return deck.length === 3 && deck[0].id === 'q1' && deck[1].id === 'q2' && deck[2].id === 'q3'; })(), null);
assert('session_cap truncates tail',
  (() => { const deck = SRS.buildDeck({}, QS, { new_per_day: 5, session_cap: 3, order: 'reviews_first' }, t0, 0);
    return deck.length === 3; })(), null);
assert('new_taken_today respected: 2 taken + cap 3 -> 1 slot',
  (() => { const deck = SRS.buildDeck({}, QS, { new_per_day: 3, session_cap: null, order: 'reviews_first' }, t0, 2);
    return deck.length === 1; })(), null);
assert('non-due review not included',
  (() => { const state = { q1: { stage:'review', due_at:t0+1000, interval_minutes:1440, consecutive_correct:1, total_seen:1, total_correct:1 } };
    const deck = SRS.buildDeck(state, QS, { new_per_day: 0, session_cap: null, order: 'reviews_first' }, t0, 0);
    return deck.length === 0; })(), null);

// --- Task 4: summary + migrate ---
assert('summary counts by stage',
  (() => { const state = {
      q1: { stage:'review', due_at:t0-1, interval_minutes:1440, consecutive_correct:1, total_seen:1, total_correct:1 },
      q2: { stage:'review', due_at:t0+1e9, interval_minutes:1440, consecutive_correct:1, total_seen:1, total_correct:1 },
      q3: { stage:'graduated', due_at:t0+1e12, interval_minutes:43200, consecutive_correct:3, total_seen:5, total_correct:5 },
      q4: { stage:'learning', due_at:t0-1, interval_minutes:10, consecutive_correct:0, total_seen:2, total_correct:0 },
    };
    const s = SRS.summary(state, QS, t0);
    return s.due === 3 && s.new === 1 && s.graduated === 1 && s.learning === 1 && s.review === 2;
  })(), null);
assert('migrate: answered correct -> learning +10min',
  (() => {
    const seeded = SRS.migrate({ q1: { correct: true }, q2: { correct: false } }, ['q2'], t0);
    return seeded.q1.stage === 'learning' && seeded.q1.due_at === t0 + 10*60*1000
        && seeded.q2.stage === 'learning' && seeded.q2.due_at === t0 + 10*60*1000;
  })(), null);
assert('migrate: empty -> empty',
  (() => { const seeded = SRS.migrate({}, [], t0); return Object.keys(seeded).length === 0; })(), null);

// --- Phase B.1: Curriculum tests ---
const CURR_QS = [
  { id: 'ul2755-b',  source: 'UL2755 §6.2.3',  category: 'Transformers' },
  { id: 'ul2755-a',  source: 'UL2755 §6.1.6',  category: 'Electrical' },
  { id: 'nec646-a',  source: 'NEC §646.1',     category: 'Scope' },
  { id: 'fxx-a',     source: 'FXX Audit',      category: 'Workspace' },
  { id: 'ul2755-c',  source: 'UL2755 §6.4.2',  category: 'Wiring' },
];

assert('buildCurriculum: 5 Qs @ per_day 2 -> 3 days',
  (() => { const c = SRS.buildCurriculum(CURR_QS, 2, '2026-04-20');
    return c.days.length === 3 && c.days[0].question_ids.length === 2
      && c.days[2].question_ids.length === 1 && c.start_date === '2026-04-20'
      && c.built_from_new_per_day === 2; })(), null);

assert('buildCurriculum: UL -> NEC -> FXX, category alpha',
  (() => { const c = SRS.buildCurriculum(CURR_QS, 5, '2026-04-20');
    const ids = c.days[0].question_ids;
    return ids[0] === 'ul2755-a' && ids[1] === 'ul2755-b' && ids[2] === 'ul2755-c'
      && ids[3] === 'nec646-a' && ids[4] === 'fxx-a'; })(), null);

assert('getDayForQuestion: returns correct day number',
  (() => { const c = SRS.buildCurriculum(CURR_QS, 2, '2026-04-20');
    return SRS.getDayForQuestion(c, 'ul2755-c') === 2
      && SRS.getDayForQuestion(c, 'fxx-a') === 3
      && SRS.getDayForQuestion(c, 'missing') === null; })(), null);

assert('completedDays: all Qs seen + past new -> completed',
  (() => { const c = SRS.buildCurriculum(CURR_QS, 2, '2026-04-20');
    const state = {
      'ul2755-a': { stage: 'learning', total_seen: 1 },
      'ul2755-b': { stage: 'learning', total_seen: 1 },
      'ul2755-c': { stage: 'new', total_seen: 0 },
    };
    const done = SRS.completedDays(c, state);
    return done.has(1) && !done.has(2) && !done.has(3); })(), null);

// --- nextState branch completeness ---
assert('TC-U-012 undefined record -> learning via new path',
  (() => { const s = SRS.nextState(undefined, true, t0);
    return s.stage === 'learning' && s.due_at === t0 + 600000; })(), null);

assert('TC-U-013 total_seen accumulates',
  (() => { const rec = { stage: 'learning', consecutive_correct: 0, interval_minutes: 10, total_seen: 5, total_correct: 5 };
    const s = SRS.nextState(rec, true, t0);
    return s.total_seen === 6; })(), null);

assert('TC-U-014 total_correct increments only on correct',
  (() => { let r = { stage: 'learning', consecutive_correct: 0, interval_minutes: 10, total_seen: 1, total_correct: 1 };
    r = SRS.nextState(r, true, t0);
    r = SRS.nextState(r, false, t0);
    return r.total_correct === 2; })(), null);

assert('TC-U-015 graduated 90d -> 180d',
  (() => { const s = SRS.nextState({ stage: 'graduated', consecutive_correct: 3, interval_minutes: 129600, total_seen: 20, total_correct: 20 }, true, t0);
    return s.stage === 'graduated' && s.interval_minutes === 259200; })(), null);

// --- buildDeck edge cases ---
assert('TC-U-021 all graduated, no new -> empty deck',
  (() => { const qs = [{ id: 'q1' }, { id: 'q2' }];
    const state = {
      q1: { stage: 'graduated', due_at: t0 + 1e12, interval_minutes: 43200, consecutive_correct: 3, total_seen: 5, total_correct: 5 },
      q2: { stage: 'graduated', due_at: t0 + 1e12, interval_minutes: 43200, consecutive_correct: 3, total_seen: 5, total_correct: 5 },
    };
    const deck = SRS.buildDeck(state, qs, { new_per_day: 10, session_cap: null, order: 'reviews_first' }, t0, 0);
    return deck.length === 0; })(), null);

assert('TC-U-022 new_per_day=0 -> no new injected',
  (() => { const qs = [{ id: 'q1' }, { id: 'q2' }];
    const deck = SRS.buildDeck({}, qs, { new_per_day: 0, session_cap: null, order: 'reviews_first' }, t0, 0);
    return deck.length === 0; })(), null);

assert('TC-U-023 empty questions array',
  (() => { const deck = SRS.buildDeck({}, [], { new_per_day: 5, session_cap: null, order: 'reviews_first' }, t0, 0);
    return deck.length === 0; })(), null);

// --- summary edge cases ---
assert('TC-U-025 all new',
  (() => { const qs = [{ id: 'q1' }, { id: 'q2' }, { id: 'q3' }];
    const s = SRS.summary({}, qs, t0);
    return s.new === 3 && s.due === 3 && s.learning === 0 && s.review === 0 && s.graduated === 0; })(), null);

assert('TC-U-026 future due not counted as due',
  (() => { const qs = [{ id: 'q1' }];
    const state = { q1: { stage: 'review', due_at: t0 + 86400000, interval_minutes: 1440, consecutive_correct: 1, total_seen: 1, total_correct: 1 } };
    const s = SRS.summary(state, qs, t0);
    return s.due === 0 && s.review === 1; })(), null);

assert('TC-U-027 graduated future not due; past due counted',
  (() => { const qs = [{ id: 'q1' }, { id: 'q2' }];
    const state = {
      q1: { stage: 'graduated', due_at: t0 + 1e9, interval_minutes: 43200, consecutive_correct: 3, total_seen: 5, total_correct: 5 },
      q2: { stage: 'graduated', due_at: t0 - 1, interval_minutes: 43200, consecutive_correct: 3, total_seen: 5, total_correct: 5 },
    };
    const s = SRS.summary(state, qs, t0);
    return s.due === 1 && s.graduated === 2; })(), null);

// --- migrate edge cases ---
assert('TC-U-030 wrongPool id overlap answered does not duplicate',
  (() => { const seeded = SRS.migrate({ q1: { correct: false } }, ['q1', 'q2'], t0);
    return Object.keys(seeded).length === 2 && seeded.q1.total_correct === 0; })(), null);

assert('TC-U-031 null inputs do not crash',
  (() => { const seeded = SRS.migrate(null, null, t0);
    return seeded && Object.keys(seeded).length === 0; })(), null);

// --- buildCurriculum edge cases ---
assert('TC-U-034 per_day larger than total -> 1 day',
  (() => { const qs = [{ id: 'a', source: 'UL2755', category: 'X' }, { id: 'b', source: 'UL2755', category: 'Y' }];
    const c = SRS.buildCurriculum(qs, 10, '2026-04-20');
    return c.days.length === 1 && c.days[0].question_ids.length === 2; })(), null);

assert('TC-U-035 empty questions -> days=[]',
  (() => { const c = SRS.buildCurriculum([], 5, '2026-04-20');
    return c.days.length === 0 && c.start_date === '2026-04-20'; })(), null);

assert('TC-U-036 same source+category stable by id',
  (() => { const qs = [
      { id: 'z', source: 'UL2755', category: 'X' },
      { id: 'a', source: 'UL2755', category: 'X' },
      { id: 'm', source: 'UL2755', category: 'X' },
    ];
    const c = SRS.buildCurriculum(qs, 5, '2026-04-20');
    return c.days[0].question_ids[0] === 'a' && c.days[0].question_ids[1] === 'm' && c.days[0].question_ids[2] === 'z'; })(), null);

// --- curriculum helpers ---
assert('TC-U-039 null curriculum -> safe defaults',
  (() => { return SRS.getDayForQuestion(null, 'x') === null && SRS.completedDays(null, {}).size === 0; })(), null);

assert('TC-U-040 stage=new with total_seen>0 does not mark day completed',
  (() => { const qs = [{ id: 'q1', source: 'UL2755', category: 'X' }];
    const c = SRS.buildCurriculum(qs, 5, '2026-04-20');
    const state = { q1: { stage: 'new', total_seen: 3 } };
    return !SRS.completedDays(c, state).has(1); })(), null);

// --- computeFinishedYmd / computeNewPerDay ---
assert('TC-U-041 finished=start+2 for 30 Qs / 10 per day',
  SRS.computeFinishedYmd(10, 30, '2026-04-21') === '2026-04-23', null);

assert('TC-U-042 new_per_day=3 for 30 Qs over 10 days',
  SRS.computeNewPerDay('2026-04-30', 30, '2026-04-21') === 3, null);

assert('TC-U-043 remaining=0 -> finish equals start (single day)',
  SRS.computeFinishedYmd(10, 0, '2026-04-21') === '2026-04-21', null);

assert('TC-U-044 newPerDay=0 -> treated as 1',
  (() => { const f = SRS.computeFinishedYmd(0, 5, '2026-04-21');
    return f === '2026-04-25'; })(), null);

assert('TC-U-045 finish earlier than start -> 1 day (clamped)',
  SRS.computeNewPerDay('2026-04-19', 10, '2026-04-21') === 10, null);

assert('TC-U-046 forward/backward consistency for divisors of 30',
  (() => {
    for (const x of [1, 2, 3, 5, 6, 10, 15, 30]) {
      const f = SRS.computeFinishedYmd(x, 30, '2026-04-21');
      const back = SRS.computeNewPerDay(f, 30, '2026-04-21');
      if (back !== x) return false;
    }
    return true;
  })(), null);

// --- ymd helper ---
assert('TC-U-047 ymd formats local date correctly',
  SRS.ymd(new Date(2026, 3, 21)) === '2026-04-21', null);

// --- Question list pure function ---
const QL_QS = [
  { id: 'a', question: 'A'.repeat(50), category: 'X', source: 'UL2755' },
  { id: 'b', question: 'B long', category: 'Y', source: 'UL2755' },
  { id: 'c', question: 'C', category: 'Z', source: 'NEC' },
];
assert('TC-U-048 questionList sorts by dueAt ascending',
  (() => {
    const tNow = 1700000000000;
    const DAY = 86400000;
    const state = {
      a: { stage: 'review', due_at: tNow + 2*DAY, interval_minutes: 4320, consecutive_correct: 1, total_seen: 2, total_correct: 2 },
      c: { stage: 'learning', due_at: tNow + 10*DAY, interval_minutes: 14400, consecutive_correct: 0, total_seen: 1, total_correct: 1 },
    };
    const list = SRS.questionList(QL_QS, state, tNow);
    return list.length === 3 && list[0].id === 'b' && list[1].id === 'a' && list[2].id === 'c'
      && list[0].daysFromToday === 0 && list[1].daysFromToday === 2 && list[2].daysFromToday === 10;
  })(), null);

assert('TC-U-049 questionList overdue returns negative daysFromToday',
  (() => {
    const tNow = 1700000000000;
    const state = { a: { stage: 'review', due_at: tNow - 3*86400000, interval_minutes: 1440, consecutive_correct: 1, total_seen: 1, total_correct: 1 } };
    const list = SRS.questionList(QL_QS.slice(0,1), state, tNow);
    return list[0].daysFromToday === -3;
  })(), null);

assert('TC-U-050 questionList empty state -> all daysFromToday 0',
  (() => {
    const list = SRS.questionList(QL_QS, {}, 1700000000000);
    return list.length === 3 && list.every(x => x.daysFromToday === 0);
  })(), null);

const summary = document.createElement('h2');
summary.textContent = pass + ' passed, ' + fail + ' failed';
summary.style.color = fail ? '#ef4444' : '#10b981';
out.appendChild(summary);
</script></body></html>

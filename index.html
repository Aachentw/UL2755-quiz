<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UL2755 Quiz 連通測試</title>
<style>
  body { font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
         max-width: 640px; margin: 2rem auto; padding: 1rem; line-height: 1.6; }
  h1 { color: #c8102e; }
  button { font-size: 1.2rem; padding: 0.8rem 1.5rem; margin: 0.3rem;
           border: none; border-radius: 8px; background: #005eb8; color: white; cursor: pointer; }
  button:active { background: #003d7a; }
  .result { background: #f0f0f0; padding: 0.8rem; border-radius: 6px; margin-top: 1rem;
            white-space: pre-wrap; font-family: monospace; }
  .ok { color: #2e7d32; } .fail { color: #c62828; }
</style>
</head>
<body>

<h1>🏍️ UL2755 Quiz — 連通性測試</h1>
<p>若你能在手機看到這段文字，<strong>代表 GitHub Pages 部署成功</strong>。
按下方按鈕測試中英文 TTS 切段朗讀。</p>

<button onclick="speakBilingual()">🔊 測試雙語 TTS（中文 + 英文術語）</button>
<button onclick="speakChineseOnly()">🗣️ 純中文測試</button>
<button onclick="listVoices()">🔍 列出可用語音</button>

<div id="result" class="result">等候點擊測試按鈕⋯</div>

<script>
const out = document.getElementById('result');

function log(msg, cls='') {
  out.innerHTML = `<span class="${cls}">${msg}</span>`;
}

// 雙語切段朗讀（核心技術：將句子拆成中英 segments，依序 speak）
function speakBilingual() {
  if (!('speechSynthesis' in window)) {
    log('❌ 此瀏覽器不支援 Web Speech API', 'fail'); return;
  }
  const segments = [
    { lang: 'zh-TW', text: 'UL 2755 規定' },
    { lang: 'en-US', text: '600 volts' },
    { lang: 'zh-TW', text: '以下設備的工作空間' },
    { lang: 'en-US', text: 'clearance' },
    { lang: 'zh-TW', text: '最小深度是 900 毫米。' }
  ];
  speechSynthesis.cancel();
  segments.forEach(seg => {
    const u = new SpeechSynthesisUtterance(seg.text);
    u.lang = seg.lang;
    u.rate = 0.95;
    speechSynthesis.speak(u);
  });
  log('✅ 播放中：UL 2755 規定 [600 volts] 以下設備的工作空間 [clearance] 最小深度是 900 毫米。', 'ok');
}

function speakChineseOnly() {
  if (!('speechSynthesis' in window)) {
    log('❌ 此瀏覽器不支援 Web Speech API', 'fail'); return;
  }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance('你好，這是騎車模式的中文語音測試。');
  u.lang = 'zh-TW';
  speechSynthesis.speak(u);
  log('✅ 播放純中文中⋯', 'ok');
}

function listVoices() {
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) {
    log('⏳ 語音清單載入中，請 1 秒後再按一次。', 'fail'); return;
  }
  const zh = voices.filter(v => v.lang.startsWith('zh'));
  const en = voices.filter(v => v.lang.startsWith('en'));
  let msg = `✅ 偵測到 ${voices.length} 個語音：\n`;
  msg += `\n中文語音 (${zh.length})：\n` + zh.map(v => `  • ${v.name} [${v.lang}]`).join('\n');
  msg += `\n\n英文語音 (${en.length})：\n` + en.slice(0, 5).map(v => `  • ${v.name} [${v.lang}]`).join('\n');
  log(msg, 'ok');
}

// 頁面載入即顯示環境資訊
window.addEventListener('load', () => {
  const info = [
    `✅ 頁面載入成功`,
    `URL: ${location.href}`,
    `協定: ${location.protocol}`,
    `UA: ${navigator.userAgent.substring(0, 80)}...`,
    `Web Speech API: ${'speechSynthesis' in window ? '✅ 支援' : '❌ 不支援'}`,
    `Wake Lock API: ${'wakeLock' in navigator ? '✅ 支援（騎車模式可用）' : '❌ 不支援'}`,
    `IndexedDB: ${'indexedDB' in window ? '✅ 支援' : '❌ 不支援'}`,
  ].join('\n');
  log(info, 'ok');
});
</script>

</body>
</html>

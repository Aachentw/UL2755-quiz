<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>UL2755 Sprint 🏍️</title>
<meta name="theme-color" content="#c8102e">
<link rel="manifest" href="manifest.webmanifest">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", "PingFang TC", sans-serif; background: #0f172a; color: #f1f5f9; line-height: 1.5; }
  body { max-width: 680px; margin: 0 auto; padding: 0.5rem 1rem 3rem; min-height: 100vh; }

  header { position: sticky; top: 0; background: #0f172a; padding: 0.7rem 0 0.3rem; z-index: 10; }
  .top { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; }
  .top .brand { font-weight: 700; color: #fca5a5; }
  .ver { font-size: 0.68rem; font-weight: 500; color: #64748b; margin-left: 0.3rem; letter-spacing: 0.02em; }
  .top .stats { display: flex; gap: 0.7rem; }
  #combo { color: #fbbf24; font-weight: 700; }
  .progress-bar { height: 4px; background: #1e293b; border-radius: 2px; margin: 0.4rem 0; overflow: hidden; }
  #progress { height: 100%; background: linear-gradient(90deg, #ef4444, #f97316); width: 0%; transition: width 0.3s; }
  #counter { font-size: 0.8rem; color: #94a3b8; text-align: right; }

  .modes { display: flex; gap: 0.4rem; margin: 0.5rem 0; }
  .modes button { flex: 1; padding: 0.6rem; border: 1px solid #334155; background: #1e293b; color: #cbd5e1; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
  .modes button.active { background: #c8102e; color: white; border-color: #c8102e; }

  .card { background: #1e293b; border-radius: 14px; padding: 1.2rem; margin-top: 0.8rem; }
  .meta { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 0.7rem; }
  .tag { background: #334155; padding: 2px 8px; border-radius: 10px; color: #cbd5e1; }
  .src { color: #94a3b8; }
  .question { font-size: 1.15rem; line-height: 1.55; margin: 0.5rem 0 1.2rem; color: #f8fafc; }

  .options, .audio-opts { display: flex; flex-direction: column; gap: 0.5rem; margin: 0.8rem 0; }
  .opt, .aopt { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.9rem 1rem; background: #0f172a; border: 2px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 1rem; text-align: left; transition: transform 0.08s, background 0.15s, border-color 0.15s; }
  .opt { cursor: pointer; }
  .opt:active { transform: scale(0.98); }
  .opt:hover:not(:disabled) { border-color: #60a5fa; }
  .opt .letter, .aopt .letter { flex: 0 0 1.6rem; height: 1.6rem; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
  .opt.right { background: #064e3b; border-color: #10b981; }
  .opt.right .letter { background: #10b981; color: white; }
  .opt.wrong { background: #7f1d1d; border-color: #ef4444; }
  .opt.wrong .letter { background: #ef4444; color: white; }
  .opt:disabled { cursor: default; opacity: 0.95; }

  .fb { margin-top: 1rem; padding: 0.9rem 1rem; border-radius: 10px; font-weight: 600; }
  .fb.ok { background: #064e3b; color: #6ee7b7; }
  .fb.no { background: #7f1d1d; color: #fecaca; }
  .expl { margin-top: 0.5rem; font-weight: 400; font-size: 0.92rem; color: #f1f5f9; line-height: 1.55; }

  .primary, .ghost { display: block; width: 100%; padding: 0.9rem; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.8rem; border: none; }
  .primary { background: #c8102e; color: white; }
  .primary:active { background: #a00d25; }
  .primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; opacity: 0.55; }
  .primary:disabled:active { background: #334155; }
  .ghost { background: transparent; border: 1px solid #475569; color: #cbd5e1; }
  .nav-row { margin-top: 0.5rem; }

  .audio-view .riding, .audio-view .stage, .audio-view button.primary, .audio-view button.ghost { text-align: center; }
  .audio-view h2 { font-size: 1.15rem; line-height: 1.55; margin: 0.5rem 0 0.8rem; color: #f8fafc; text-align: left; }
  .riding { font-size: 1.1rem; color: #fca5a5; margin-bottom: 0.8rem; text-align: center; }
  .stage { font-size: 1.05rem; color: #fbbf24; margin: 0.8rem 0 0.5rem; font-weight: 600; text-align: center; }

  .done { text-align: center; padding: 1rem; }
  .done h2 { color: #fbbf24; }

  footer { text-align: center; font-size: 0.75rem; color: #64748b; margin-top: 1.5rem; }

  @keyframes shakeOk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 50%{transform:translateX(3px)} 75%{transform:translateX(-2px)} }
  @keyframes shakeNo { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px)} 30%{transform:translateX(8px)} 45%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 75%{transform:translateX(-3px)} }
  .shake-ok { animation: shakeOk 0.25s ease; box-shadow: 0 0 0 3px #10b981 inset; }
  .shake-no { animation: shakeNo 0.45s ease; box-shadow: 0 0 0 3px #ef4444 inset; }

  .dashboard { text-align: left; }
  .dashboard h2 { margin: 0.2rem 0 0.5rem; color: #f8fafc; }
  .progress-large { height: 14px; background: #0f172a; border-radius: 7px; overflow: hidden; margin: 0.4rem 0; border: 1px solid #334155; }
  .progress-large .bar { height: 100%; background: linear-gradient(90deg,#ef4444,#f97316); transition: width 0.3s; }
  .muted { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem; }
  .metric-list { list-style: none; padding: 0; margin: 1rem 0; }
  .metric-list li { padding: 0.7rem 0.9rem; background: #0f172a; border: 1px solid #334155; border-radius: 10px; margin: 0.4rem 0; display: flex; justify-content: space-between; align-items: center; }
  .metric-list li b { font-size: 1.2rem; color: #f8fafc; }
  .dash-actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 20; padding: 1rem; }
  .modal[hidden] { display: none !important; }
  .modal-inner { background: #1e293b; border-radius: 14px; padding: 1.2rem; max-width: 420px; width: 100%; }
  .modal h2 { margin-top: 0; color: #f8fafc; }
  .modal label { display: block; margin: 0.8rem 0; color: #cbd5e1; font-size: 0.95rem; }
  .modal input { width: 100%; padding: 0.6rem; margin-top: 0.3rem; background: #0f172a; border: 1px solid #334155; color: #f1f5f9; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
  .primary-danger { display: block; width: 100%; padding: 0.9rem; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.6rem; border: none; background: #b91c1c; color: white; }
  .primary-danger:active { background: #7f1d1d; }
  #confirmActions > button { margin-top: 0.5rem; }

  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; }
  .cal-header button { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 0.4rem 0.75rem; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: border-color 0.15s, transform 0.08s; }
  .cal-header button:hover { border-color: #3b82f6; }
  .cal-header button:active { transform: scale(0.95); }
  .cal-title { font-size: 1.1rem; font-weight: 700; color: #f8fafc; letter-spacing: 0.02em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-dow { text-align: center; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; padding: 0.35rem 0; color: #94a3b8; text-transform: uppercase; }
  .cal-dow.weekend { color: #fca5a5; }
  .cal-cell { position: relative; aspect-ratio: 1; container-type: inline-size; background: #0f172a; border: 1px solid rgba(51, 65, 85, 0.65); border-radius: 10px; padding: 5px 6px; color: #64748b; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.08s, border-color 0.15s, box-shadow 0.2s; min-width: 0; }
  .cal-cell:not(.empty) { cursor: pointer; }
  .cal-cell:not(.empty):hover { border-color: #3b82f6; transform: translateY(-1px); }
  .cal-cell:not(.empty):active { transform: scale(0.97); }
  .cal-cell .cell-top { display: flex; justify-content: flex-start; align-items: flex-start; width: 100%; }
  .cal-cell .date { font-size: max(0.66rem, 16cqw); font-weight: 700; line-height: 1; color: #f1f5f9; }
  .cal-cell .cell-center { flex: 1; display: flex; align-items: center; justify-content: center; font-size: max(0.58rem, 16cqw); font-weight: 700; color: #94a3b8; line-height: 1; min-width: 0; }
  .cal-cell .cell-center.done-check { color: #10b981; font-size: max(1.3rem, 50cqw); font-weight: 900; line-height: 0.8; text-shadow: 0 0 12px rgba(16, 185, 129, 0.55); }
  .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-cell.empty .date { visibility: hidden; }
  .cal-cell.blank .date { color: #94a3b8; opacity: 0.4; }
  .cal-cell.blank .cell-center { display: none; }
  .cal-cell.today { background: rgba(59, 130, 246, 0.22); border: 1.5px solid rgba(59, 130, 246, 0.9); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18), 0 4px 18px -4px rgba(59, 130, 246, 0.55); }
  .cal-cell.today .date { color: #ffffff; }
  .cal-cell.today .cell-center { color: #dbeafe; }
  .cal-cell.done { background: rgba(16, 185, 129, 0.12); border-color: rgba(16, 185, 129, 0.45); }
  .cal-cell.done .date { color: #d1fae5; }
  .cal-cell.slip { background: rgba(245, 158, 11, 0.13); border-color: rgba(245, 158, 11, 0.55); }
  .cal-cell.slip .date { color: #fef3c7; }
  .cal-cell.slip .cell-center { color: #fde68a; }

  .day-header { margin: 0.3rem 0 0.8rem; }
  .day-header .sub { color: #94a3b8; font-size: 0.9rem; margin-top: 0.25rem; }
  .day-card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 0.9rem; margin: 0.6rem 0; }
  .day-card .hdr { display: flex; justify-content: space-between; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem; font-size: 0.78rem; color: #94a3b8; flex-wrap: wrap; }
  .day-card .q { color: #f8fafc; margin: 0.4rem 0 0.5rem; line-height: 1.5; }
  .day-card .ans { color: #6ee7b7; font-weight: 600; margin: 0.4rem 0; line-height: 1.5; }
  .day-card .expl { color: #cbd5e1; font-size: 0.9rem; line-height: 1.55; margin-top: 0.4rem; }
  .day-actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
  .day-actions button { flex: 1 1 140px; }
  .sbadge { padding: 2px 7px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
  .sbadge.new { background: #1e293b; color: #cbd5e1; }
  .sbadge.learning { background: #7c2d12; color: #fed7aa; }
  .sbadge.review { background: #1e3a8a; color: #dbeafe; }
  .sbadge.graduated { background: #064e3b; color: #6ee7b7; }

  .speed-row { display: flex; gap: 0.3rem; align-items: center; margin: 0.8rem 0; flex-wrap: wrap; }
  .speed-label { font-size: 0.85rem; color: #94a3b8; margin-right: 0.3rem; }
  .speed-btn { flex: 1; min-width: 48px; padding: 0.5rem 0.6rem; background: #0f172a; border: 1px solid #334155; color: #cbd5e1; border-radius: 6px; font-size: 0.88rem; cursor: pointer; }
  .speed-btn.active { background: #c8102e; color: white; border-color: #c8102e; }
</style>
</head>
<body>

<header>
  <div class="top">
    <span class="brand">🏠 Home <span class="ver" id="appVer"></span></span>
    <div class="stats">
      <span id="streak">🔥 0</span>
      <span id="combo"></span>
    </div>
  </div>
  <div class="progress-bar"><div id="progress"></div></div>
  <div id="counter">0 / 0</div>
</header>

<main id="card" class="card">Loading…</main>

<footer>UL2755 + NEC 646 + FXX Audit · MVP · <a href="https://github.com/Aachentw/UL2755-quiz" style="color:#64748b;">source</a></footer>

<div id="settingsModal" class="modal" hidden>
  <div class="modal-inner">
    <h2>Settings</h2>
    <label>New questions per day
      <input type="number" id="newPerDay" min="1" max="50" value="10">
    </label>
    <label>Finished by
      <input type="date" id="finishedDate">
    </label>
    <button class="primary" onclick="saveSettingsFromForm()">Save</button>
    <button class="ghost" onclick="resetAllSrs()">Reset learning records</button>
    <button class="ghost" onclick="closeSettings()">Close</button>
  </div>
</div>

<div id="confirmModal" class="modal" hidden>
  <div class="modal-inner">
    <h2 id="confirmTitle"></h2>
    <div id="confirmBody" style="color:#cbd5e1;font-size:0.92rem;line-height:1.55;white-space:pre-line;margin:0.6rem 0 1rem;"></div>
    <div id="confirmActions"></div>
  </div>
</div>

<script src="srs.js"></script>
<script src="app.js"></script>
</body>
</html>
